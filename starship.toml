# ─────────────────────────────────────────────
# Shadow Monarch — p10k Lean Style
# Left:  os  path  branch  status  langs
# Right: aws  duration  time
# Line2: ❯
# ─────────────────────────────────────────────
palette = "shadow_monarch"

format = """
$os$directory$git_branch$git_status$python$nodejs$ruby$java$line_break$character"""

right_format = """$aws$cmd_duration$time"""

[palettes.shadow_monarch]
void     = "#0a0015"
shadow   = "#2d1b69"
violet   = "#8b5cf6"
lavender = "#a78bfa"
gold     = "#f59e0b"
amber    = "#f97316"
emerald  = "#10b981"
rose     = "#fb7185"
magenta  = "#d946ef"
indigo   = "#6366f1"
teal     = "#14b8a6"
silver   = "#e2e8f0"
dim      = "#64748b"
red      = "#ef4444"

# ─────────────────────────────────────────────
# Left segments — compact, no brackets
# ─────────────────────────────────────────────
[os]
disabled = false
format = "[$symbol ](fg:silver bold)"

[os.symbols]
Macos = "󰀵"

[directory]
style = "fg:violet bold"
format = "[$path ](fg:violet bold)"
truncation_length = 4
truncation_symbol = "…/"
read_only = "󰌾 "
read_only_style = "fg:rose"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Desktop" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = "󰘬 "
style = "fg:magenta bold"
format = "[$symbol$branch ](fg:magenta bold)"
truncation_length = 20
truncation_symbol = "…"

[git_status]
style = "fg:gold bold"
format = "[$all_status$ahead_behind](fg:gold bold)"
conflicted = "󰩌 "
ahead      = "⇡$count "
behind     = "⇣$count "
diverged   = "⇕⇡$ahead_count⇣$behind_count "
untracked  = "? "
stashed    = "≡ "
modified   = "! "
staged     = "+ "
deleted    = "✘ "

[python]
symbol = "󰌠 "
format = "[$symbol$version ](fg:indigo bold)"
detect_extensions = ["py"]
detect_files = [".python-version", "Pipfile", "pyproject.toml", "requirements.txt"]

[nodejs]
symbol = "󰎙 "
format = "[$symbol$version ](fg:emerald bold)"
detect_files = ["package.json", ".node-version", ".nvmrc"]

[ruby]
symbol = "󰴭 "
format = "[$symbol$version ](fg:rose bold)"
detect_files = [".ruby-version", "Gemfile"]

[java]
symbol = "󰬷 "
format = "[$symbol$version ](fg:amber bold)"
detect_files = ["pom.xml", "build.gradle"]

# ─────────────────────────────────────────────
# Right segments
# ─────────────────────────────────────────────
[aws]
symbol = "󰸏 "
format = "[$symbol$profile ](fg:gold bold)"

[cmd_duration]
min_time = 500
format = "[⏱ $duration ](fg:dim)"

[time]
disabled = false
time_format = "%I:%M %p"
format = "[$time](fg:teal bold)"

# ─────────────────────────────────────────────
# Prompt character
# ─────────────────────────────────────────────
[line_break]
disabled = false

[character]
success_symbol = "[❯](bold fg:lavender)"
error_symbol   = "[❯](bold fg:red)"
vimcmd_symbol  = "[❮](bold fg:gold)"
