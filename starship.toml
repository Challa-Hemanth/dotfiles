# Powerline Pastel — Minimal but Powerful
palette = "pastel"

format = """
$os\
$directory\
$git_branch\
$git_status\
$python\
$ruby\
$nodejs\
$java\
$aws\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

[palettes.pastel]
pink = "#f5c2e7"
mauve = "#cba6f7"
blue = "#89b4fa"
lavender = "#b4befe"
teal = "#94e2d5"
green = "#a6e3a1"
yellow = "#f9e2af"
peach = "#fab387"
red = "#f38ba8"
surface = "#313244"
overlay = "#6c7086"
text = "#cdd6f4"
subtext = "#bac2de"
base = "#1e1e2e"
mantle = "#181825"

[os]
disabled = false
style = "fg:text"
format = "[$symbol ]($style)"

[os.symbols]
Macos = "🍎"

[directory]
style = "fg:blue bold"
format = "[ 󰉋 $path ]($style)"
truncation_length = 4
truncation_symbol = "…/"
read_only = " 󰌾"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Desktop" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = " "
style = "fg:mauve bold"
format = "[ $symbol$branch ]($style)"
truncation_length = 20

[git_status]
style = "fg:peach"
format = "[$all_status$ahead_behind ]($style)"
conflicted = "󰩌 "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "󰋗 ${count} "
stashed = " "
modified = "󰏫 ${count} "
staged = "󰐖 ${count} "
deleted = "󱪢 ${count} "

[python]
symbol = " "
style = "fg:yellow"
format = "[ $symbol($version) ]($style)"

[ruby]
symbol = " "
style = "fg:red"
format = "[ $symbol($version) ]($style)"

[nodejs]
symbol = " "
style = "fg:green"
format = "[ $symbol($version) ]($style)"

[java]
symbol = " "
style = "fg:peach"
format = "[ $symbol($version) ]($style)"

[aws]
symbol = "󰸏 "
style = "fg:yellow"
format = "[ $symbol($profile) ]($style)"

[fill]
symbol = " "

[cmd_duration]
min_time = 500
style = "fg:overlay"
format = "[⏱ $duration ]($style)"

[time]
disabled = false
time_format = "%I:%M %p"
style = "fg:subtext bold"
format = "[ 🕐 $time ]($style)"

[line_break]
disabled = false

[character]
success_symbol = "[❯](bold fg:green)"
error_symbol = "[❯](bold fg:red)"
vimcmd_symbol = "[❮](bold fg:mauve)"
